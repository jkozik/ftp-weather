---
# sancap FTP Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftp-sancap
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ftp-sancap
  template:
    metadata:
      labels:
        app: ftp-sancap
    spec:
      containers:
      - name: vsftpd
        image: fauria/vsftpd:latest
        ports:
        - containerPort: 20
          name: ftp-data
        - containerPort: 21
          name: ftp-control
        - containerPort: 31300
          name: pasv-min
        - containerPort: 31310
          name: pasv-max
        env:
        - name: FTP_USER
          value: "sancap"
        - name: FTP_PASS
          valueFrom:
            secretKeyRef:
              name: ftp-passwords
              key: sancap-password
        - name: PASV_ADDRESS
          value: "192.168.100.204"
        - name: PASV_MIN_PORT
          value: "31300"
        - name: PASV_MAX_PORT
          value: "31310"
        - name: FILE_OPEN_MODE
          value: "0644"          
        - name: LOCAL_UMASK
          value: "022"          
        volumeMounts:
        - name: ftp-data
          mountPath: /home/vsftpd/sancap
          subPath: sancap
        securityContext:
          capabilities:
            add:
              - NET_BIND_SERVICE
      volumes:
      - name: ftp-data
        persistentVolumeClaim:
          claimName: weather-ftp-pvc

---
# sancap FTP Service
apiVersion: v1
kind: Service
metadata:
  name: ftp-sancap
  namespace: default
spec:
  type: NodePort
  selector:
    app: ftp-sancap
  ports:
  - name: ftp-data
    port: 20
    targetPort: 20
    nodePort: 30320
    protocol: TCP
  - name: ftp-control
    port: 21
    targetPort: 21
    nodePort: 30321
    protocol: TCP
  - name: pasv-1
    port: 31300
    targetPort: 31300
    nodePort: 31300
    protocol: TCP
  - name: pasv-2
    port: 31301
    targetPort: 31301
    nodePort: 31301
    protocol: TCP
  - name: pasv-3
    port: 31302
    targetPort: 31302
    nodePort: 31302
    protocol: TCP
  - name: pasv-4
    port: 31303
    targetPort: 31303
    nodePort: 31303
    protocol: TCP
  - name: pasv-5
    port: 31304
    targetPort: 31304
    nodePort: 31304
    protocol: TCP
  - name: pasv-6
    port: 31305
    targetPort: 31305
    nodePort: 31305
    protocol: TCP
  - name: pasv-7
    port: 31306
    targetPort: 31306
    nodePort: 31306
    protocol: TCP
  - name: pasv-8
    port: 31307
    targetPort: 31307
    nodePort: 31307
    protocol: TCP
  - name: pasv-9
    port: 31308
    targetPort: 31308
    nodePort: 31308
    protocol: TCP
  - name: pasv-10
    port: 31309
    targetPort: 31309
    nodePort: 31309
    protocol: TCP
  - name: pasv-11
    port: 31310
    targetPort: 31310
    nodePort: 31310
    protocol: TCP
